name: Build Desktop Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install py2app pywebview requests beautifulsoup4 playwright
        playwright install chromium
    
    - name: Build macOS app
      run: |
        python setup.py py2app
        ls -la dist/
    
    - name: Create DMG
      run: |
        hdiutil create -volname "亚马逊链接生成器" -srcfolder dist/亚马逊链接生成器.app -ov -format UDZO "亚马逊链接生成器-macOS.dmg"
        ls -la *.dmg
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macOS-app
        path: 亚马逊链接生成器-macOS.dmg

  build-windows-full:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview requests beautifulsoup4 playwright
    
    - name: Install Chromium
      run: |
        python -m playwright install chromium
    
    - name: Build Windows exe (full)
      run: |
        pyinstaller --clean --onefile amazon_link_generator.spec
        ls dist/
    
    - name: Copy Playwright browsers
      run: |
        $playwrightPath = python -c "import playwright; print(playwright.__file__)"
        $browserPath = Join-Path (Split-Path $playwrightPath) "driver\package\.local-browsers"
        if (Test-Path $browserPath) {
          Copy-Item -Path $browserPath -Destination "dist\browsers" -Recurse -Force
          Write-Host "Browsers copied successfully"
        } else {
          Write-Host "Browser path not found at $browserPath"
        }
        ls dist/
    
    - name: Create ZIP with browsers
      run: |
        Compress-Archive -Path "dist\*" -DestinationPath "亚马逊链接生成器-Windows-完整版.zip"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-app-full
        path: 亚马逊链接生成器-Windows-完整版.zip
