name: Build Desktop Apps

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install py2app pywebview requests beautifulsoup4 playwright
        playwright install chromium
    
    - name: Build macOS app
      run: |
        python setup.py py2app
    
    - name: Create DMG
      run: |
        hdiutil create -volname "亚马逊链接生成器" -srcfolder dist/亚马逊链接生成器.app -ov -format UDZO "亚马逊链接生成器-macOS.dmg"
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v3
      with:
        name: macOS-app
        path: 亚马逊链接生成器-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview requests beautifulsoup4 playwright
        playwright install chromium
    
    - name: Build Windows exe
      run: |
        pyinstaller --clean amazon_link_generator.spec
    
    - name: Create ZIP
      run: |
        Compress-Archive -Path "dist\亚马逊链接生成器.exe" -DestinationPath "亚马逊链接生成器-Windows.zip"
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v3
      with:
        name: Windows-app
        path: 亚马逊链接生成器-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Download macOS artifact
      uses: actions/download-artifact@v3
      with:
        name: macOS-app
        path: ./release/
    
    - name: Download Windows artifact
      uses: actions/download-artifact@v3
      with:
        name: Windows-app
        path: ./release/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: ./release/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
