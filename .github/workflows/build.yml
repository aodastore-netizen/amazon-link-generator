name: Build Desktop Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install py2app pywebview requests beautifulsoup4 playwright
        playwright install chromium
    - name: Build macOS app
      run: python setup.py py2app
    - name: Create DMG
      run: hdiutil create -volname "亚马逊链接生成器" -srcfolder dist/亚马逊链接生成器.app -ov -format UDZO "亚马逊链接生成器-macOS.dmg"
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        files: 亚马逊链接生成器-macOS.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview requests beautifulsoup4 playwright
        playwright install chromium
    - name: Build Windows exe
      run: pyinstaller --clean amazon_link_generator.spec
    - name: Create ZIP
      run: Compress-Archive -Path "dist\亚马逊链接生成器.exe" -DestinationPath "亚马逊链接生成器-Windows.zip"
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        files: 亚马逊链接生成器-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
