name: Build Desktop Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install py2app pywebview requests beautifulsoup4
    
    - name: Build macOS app
      run: |
        python setup.py py2app
        ls -la dist/
    
    - name: Create DMG
      run: |
        hdiutil create -volname "亚马逊链接生成器" -srcfolder dist/亚马逊链接生成器.app -ov -format UDZO "亚马逊链接生成器-macOS.dmg"
        ls -la *.dmg
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macOS-app
        path: 亚马逊链接生成器-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview requests beautifulsoup4
    
    - name: Build Windows exe
      run: |
        pyinstaller --clean amazon_link_generator.spec
        ls dist/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-app
        path: dist/亚马逊链接生成器.exe
