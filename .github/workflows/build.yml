name: Build Desktop Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install py2app pywebview requests beautifulsoup4 playwright
        playwright install chromium
    
    - name: Build macOS app
      run: python setup.py py2app
    
    - name: Create DMG
      run: hdiutil create -volname "亚马逊链接生成器" -srcfolder dist/亚马逊链接生成器.app -ov -format UDZO "亚马逊链接生成器-macOS.dmg"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macOS-app
        path: 亚马逊链接生成器-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview requests beautifulsoup4 playwright
    
    - name: Install Chromium
      run: playwright install chromium
    
    - name: Build Windows exe
      run: pyinstaller --clean amazon_link_generator.spec
    
    - name: Create install script
      shell: cmd
      run: |
        echo @echo off > dist\install_playwright.bat
        echo chcp 65001 ^>nul >> dist\install_playwright.bat
        echo echo ========================================== >> dist\install_playwright.bat
        echo echo  亚马逊链接生成器 - Playwright 安装向导 >> dist\install_playwright.bat
        echo echo ========================================== >> dist\install_playwright.bat
        echo echo. >> dist\install_playwright.bat
        echo echo 正在安装 Playwright... >> dist\install_playwright.bat
        echo pip install playwright >> dist\install_playwright.bat
        echo echo. >> dist\install_playwright.bat
        echo echo 正在下载 Chromium 浏览器（约100MB）... >> dist\install_playwright.bat
        echo playwright install chromium >> dist\install_playwright.bat
        echo echo. >> dist\install_playwright.bat
        echo echo 安装完成！请重新启动软件。 >> dist\install_playwright.bat
        echo pause >> dist\install_playwright.bat
    
    - name: Upload exe
      uses: actions/upload-artifact@v4
      with:
        name: Windows-exe
        path: dist/amazon_link_generator.exe
    
    - name: Upload with install script
      uses: actions/upload-artifact@v4
      with:
        name: Windows-with-installer
        path: |
          dist/amazon_link_generator.exe
          dist/install_playwright.bat
