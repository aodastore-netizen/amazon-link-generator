<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚马逊排名查询工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 26px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-success {
            border-left: 4px solid #28a745;
        }
        .result-notfound {
            border-left: 4px solid #ffc107;
        }
        .result-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .rank-display {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        .rank-number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }
        .rank-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .info-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
        }
        .info-label {
            color: #999;
            font-size: 12px;
        }
        .info-value {
            color: #333;
            font-weight: 600;
            margin-top: 3px;
        }
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }
        .copy-btn:hover {
            background: #5a6fd6;
        }
        .nav-links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
        .steps {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .steps h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #333;
        }
        .steps ol {
            margin-left: 20px;
            color: #666;
        }
        .steps li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 亚马逊排名查询工具</h1>
        <p class="subtitle">查询产品在亚马逊搜索结果中的排名位置</p>

        <div class="steps">
            <h3>📖 使用说明</h3>
            <ol>
                <li>输入搜索关键词（如：deer camera）</li>
                <li>输入产品 ASIN（如：B0GPVLJC3B）</li>
                <li>点击"查询排名"按钮</li>
                <li>获取排名结果（格式：页码-位置，如 8-198）</li>
                <li>复制排名用于链接生成器</li>
            </ol>
        </div>

        <div class="form-group">
            <label for="keyword">搜索关键词</label>
            <input type="text" id="keyword" placeholder="例如: deer camera">
            <p class="hint">用户在亚马逊搜索的关键词</p>
        </div>

        <div class="form-group">
            <label for="asin">产品 ASIN</label>
            <input type="text" id="asin" placeholder="例如: B0GPVLJC3B">
            <p class="hint">亚马逊产品唯一标识，10位字符</p>
        </div>

        <button class="btn" id="checkBtn" onclick="checkRank()">查询排名</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在搜索亚马逊...</p>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">最多搜索前10页，请耐心等待</p>
        </div>

        <div class="result" id="result">
            <div class="result-title">查询结果</div>
            <div class="rank-display">
                <div class="rank-number" id="rankNumber">-</div>
                <div class="rank-label">搜索排名</div>
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">关键词</div>
                    <div class="info-value" id="infoKeyword">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">ASIN</div>
                    <div class="info-value" id="infoAsin">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">页码</div>
                    <div class="info-value" id="infoPage">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">位置</div>
                    <div class="info-value" id="infoPosition">-</div>
                </div>
            </div>
            <button class="copy-btn" onclick="copyRank()">复制排名</button>
        </div>

        <div class="nav-links">
            <a href="amazon-link-generator.html">← 返回链接生成器</a>
        </div>
    </div>

    <script>
        // 模拟排名查询（实际使用时需要后端API）
        async function checkRank() {
            const keyword = document.getElementById('keyword').value.trim();
            const asin = document.getElementById('asin').value.trim().toUpperCase();
            const btn = document.getElementById('checkBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            if (!keyword || !asin) {
                alert('请填写关键词和ASIN');
                return;
            }

            if (asin.length !== 10) {
                alert('ASIN 必须是10位字符');
                return;
            }

            // 显示加载状态
            btn.disabled = true;
            loading.classList.add('show');
            result.classList.remove('show');

            // 模拟查询延迟（实际使用时这里调用后端API）
            // 模拟几种可能的结果
            const mockResults = [
                { page: 1, position: 5 },
                { page: 3, position: 45 },
                { page: 8, position: 198 },
                null // 未找到
            ];
            
            // 根据ASIN生成固定的模拟结果（这样同一个ASIN结果一致）
            const hash = asin.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const mockResult = mockResults[hash % mockResults.length];

            await new Promise(resolve => setTimeout(resolve, 2000));

            loading.classList.remove('show');
            btn.disabled = false;

            if (mockResult) {
                const rank = `${mockResult.page}-${mockResult.position}`;
                document.getElementById('rankNumber').textContent = rank;
                document.getElementById('infoKeyword').textContent = keyword;
                document.getElementById('infoAsin').textContent = asin;
                document.getElementById('infoPage').textContent = `第${mockResult.page}页`;
                document.getElementById('infoPosition').textContent = `第${mockResult.position}位`;
                result.classList.add('show', 'result-success');
                result.classList.remove('result-notfound');
            } else {
                document.getElementById('rankNumber').textContent = '未找到';
                document.getElementById('infoKeyword').textContent = keyword;
                document.getElementById('infoAsin').textContent = asin;
                document.getElementById('infoPage').textContent = '-';
                document.getElementById('infoPosition').textContent = '-';
                result.classList.add('show', 'result-notfound');
                result.classList.remove('result-success');
            }
        }

        function copyRank() {
            const rank = document.getElementById('rankNumber').textContent;
            if (rank && rank !== '-' && rank !== '未找到') {
                navigator.clipboard.writeText(rank).then(() => {
                    const btn = document.querySelector('.copy-btn');
                    btn.textContent = '已复制!';
                    setTimeout(() => {
                        btn.textContent = '复制排名';
                    }, 2000);
                });
            }
        }

        // 回车键触发查询
        document.getElementById('keyword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkRank();
        });
        document.getElementById('asin').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkRank();
        });
    </script>
</body>
</html>
